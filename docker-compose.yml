services:
  postgres:
    image: postgres:16-alpine
    container_name: ziovpo-labi-postgres
    environment:
      POSTGRES_DB: ziovpo_labi
      POSTGRES_USER: ziovpo
      POSTGRES_PASSWORD: change-me
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
