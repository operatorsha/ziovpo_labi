spring:
  application:
    name: ziovpo-labi
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ziovpo_labi}
    username: ${DB_USERNAME:ziovpo}
    password: ${DB_PASSWORD:ziovpo}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:8443}
  ssl:
    enabled: ${SSL_ENABLED:false}
    key-store: ${SSL_KEYSTORE_PATH:classpath:server.p12}
    key-store-password: ${SSL_KEYSTORE_PASSWORD:change-me}
    key-store-type: PKCS12
    key-alias: ${SSL_KEY_ALIAS:ziovpo}

jwt:
  secret: ${JWT_SECRET:local-development-secret-must-be-replaced-in-production}
  access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
  refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
